    <script>
        const items = ['🍓', '🍓', '🍰', '🍰', '🥤', '🥤', '🍦', '🍦', '🍪', '🍪', '🎁', '🎁'];
        let flippedCards = [];
        let matchedCount = 0;
        const gameBoard = document.getElementById('game-board');
        const scoreDisplay = document.getElementById('score');
        const winMessage = document.getElementById('win-message');

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function createBoard() {
            const shuffledItems = shuffle([...items]);
            gameBoard.innerHTML = '';
            shuffledItems.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'card w-full h-[100px]';
                card.innerHTML = `
                    <div class="card-inner" onclick="flipCard(this, '${item}')">
                        <div class="card-front">?</div>
                        <div class="card-back">${item}</div>
                    </div>
                `;
                gameBoard.appendChild(card);
            });
        }

        function flipCard(cardInner, item) {
            const card = cardInner.parentElement;
            if (card.classList.contains('flipped') || flippedCards.length === 2) return;

            card.classList.add('flipped');
            flippedCards.push({ card, item });

            if (flippedCards.length === 2) {
                setTimeout(checkMatch, 700);
            }
        }

        function checkMatch() {
            const [card1, card2] = flippedCards;
            if (card1.item === card2.item) {
                matchedCount += 2;
                scoreDisplay.innerText = `수확한 딸기: ${matchedCount / 2}세트`;
                if (matchedCount === items.length) {
                    winMessage.classList.remove('hidden');
                }
            } else {
                card1.card.classList.remove('flipped');
                card2.card.classList.remove('flipped');
            }
            flippedCards = [];
        }

        function resetGame() {
            matchedCount = 0;
            scoreDisplay.innerText = '수확한 딸기: 0개';
            winMessage.classList.add('hidden');
            createBoard();
        }

        // 시작
        window.onload = createBoard;
    </script>
